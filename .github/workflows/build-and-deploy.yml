name: Build and Deploy Frontend

on:
  push:
    branches: [ main, master ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Set git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and deploy
        env:
          VITE_API_BASE_URL: ${{ secrets.BACKEND_URL }}
          # GITHUB_TOKEN is automatically provided in Actions; gh-pages will use it
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "WARNING: BACKEND_URL secret is not set. The site will still build and deploy, but admin mutations will be disabled until a backend URL is configured."
          fi
          npm run build
          npm run deploy
